name: Auto Merge Claude PRs

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Create PR, squash merge, and reset branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Close any existing open PRs for this branch
            const { data: existingPrs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'main',
              state: 'open'
            });

            for (const oldPr of existingPrs) {
              console.log(`Closing stale PR #${oldPr.number}`);
              await github.rest.pulls.update({
                owner, repo,
                pull_number: oldPr.number,
                state: 'closed'
              });
            }

            // Create a fresh PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: context.payload.head_commit?.message?.split('\n')[0] || branch.replace('claude/', ''),
              head: branch,
              base: 'main'
            });

            // Wait and retry merge
            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                const { data: prData } = await github.rest.pulls.get({
                  owner, repo,
                  pull_number: pr.number
                });

                if (prData.mergeable === false) {
                  console.log(`PR #${pr.number} has conflicts - attempting to update branch`);
                  try {
                    await github.rest.pulls.updateBranch({
                      owner, repo,
                      pull_number: pr.number
                    });
                    await new Promise(r => setTimeout(r, 5000));
                  } catch (e) {
                    console.log('Branch update failed:', e.message);
                  }
                }

                await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });
                console.log(`PR #${pr.number} merged successfully on attempt ${attempt}`);
                break;
              } catch (e) {
                console.log(`Merge attempt ${attempt} failed: ${e.message}`);
                if (attempt < 5) {
                  await new Promise(r => setTimeout(r, 3000 * attempt));
                } else {
                  throw e;
                }
              }
            }

            // After squash merge, reset the claude branch to main's HEAD
            // This prevents future conflicts caused by squash merge creating
            // different commit hashes for the same changes
            const { data: mainRef } = await github.rest.git.getRef({
              owner, repo,
              ref: 'heads/main'
            });

            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branch}`,
              sha: mainRef.object.sha,
              force: true
            });
            console.log(`Branch ${branch} reset to main (${mainRef.object.sha})`);

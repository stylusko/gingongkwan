name: Auto Merge Claude PRs

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Close any existing open PRs for this branch (may have stale conflicts)
            const { data: existingPrs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'main',
              state: 'open'
            });

            for (const oldPr of existingPrs) {
              console.log(`Closing stale PR #${oldPr.number}`);
              await github.rest.pulls.update({
                owner, repo,
                pull_number: oldPr.number,
                state: 'closed'
              });
            }

            // Create a fresh PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: branch.replace('claude/', ''),
              head: branch,
              base: 'main'
            });

            // Wait and retry merge (PR may need a moment to become mergeable)
            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                // Check PR mergeable status
                const { data: prData } = await github.rest.pulls.get({
                  owner, repo,
                  pull_number: pr.number
                });

                if (prData.mergeable === false) {
                  console.log(`PR #${pr.number} has conflicts - attempting to update branch`);
                  try {
                    await github.rest.pulls.updateBranch({
                      owner, repo,
                      pull_number: pr.number
                    });
                    // Wait for branch update
                    await new Promise(r => setTimeout(r, 5000));
                  } catch (e) {
                    console.log('Branch update failed:', e.message);
                  }
                }

                await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });
                console.log(`PR #${pr.number} merged successfully on attempt ${attempt}`);
                return;
              } catch (e) {
                console.log(`Merge attempt ${attempt} failed: ${e.message}`);
                if (attempt < 5) {
                  await new Promise(r => setTimeout(r, 3000 * attempt));
                } else {
                  throw e;
                }
              }
            }

    // 이미지 압축 함수 (최대 1MB에 가깝게 유지)
    async function compressImage(file,maxBytes=1024*1024){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=function(e){
          const img=new Image();
          img.onload=function(){
            const canvas=document.createElement('canvas');
            let w=img.width,h=img.height;
            
            // 1단계: 너무 큰 이미지만 리사이즈 (1600px 이상일 때만)
            const maxSize=1600;
            if(w>maxSize||h>maxSize){
              if(w>h){h=Math.round(h*(maxSize/w));w=maxSize;}
              else{w=Math.round(w*(maxSize/h));h=maxSize;}
            }
            canvas.width=w;canvas.height=h;
            const ctx=canvas.getContext('2d');
            ctx.drawImage(img,0,0,w,h);
            
            // 2단계: 품질 1.0으로 시작, 1MB 넘으면 조금씩 낮춤 (최소 0.8)
            let quality=1.0;
            const minQuality=0.8;
            
            const tryCompress=(q)=>{
              canvas.toBlob(blob=>{
                if(!blob){reject(new Error('Blob 변환 실패'));return;}
                
                // 1MB 이하이거나 최소 품질에 도달하면 완료
                if(blob.size<=maxBytes||q<=minQuality){
                  console.log('압축 완료: '+Math.round(blob.size/1024)+'KB, 품질: '+q.toFixed(2));
                  resolve(blob);
                }else{
                  // 아직 크면 품질 살짝 낮춰서 재시도
                  tryCompress(q-0.03);
                }
              },'image/jpeg',q);
            };
            
            tryCompress(quality);
          };
          img.onerror=reject;
          img.src=e.target.result;
        };
        reader.onerror=reject;
        reader.readAsDataURL(file);
      });
    }

    async function init(){
      try{
        // Google redirect 로그인 결과 처리
        const redirectResult=await auth.getRedirectResult().catch(()=>null);
        if(redirectResult&&redirectResult.user){
          const credential=firebase.auth.GoogleAuthProvider.credentialFromResult(redirectResult);
          if(credential&&credential.accessToken)localStorage.setItem('googleAccessToken',credential.accessToken);
          // YouTube 토큰 재인증 redirect였으면 토큰만 저장하고 안내
          if(localStorage.getItem('ytTokenPending')){
            localStorage.removeItem('ytTokenPending');
            setTimeout(()=>showToast('YouTube 인증 완료! 다시 플레이리스트 생성을 눌러주세요'),500);
          }else{
            // 일반 로그인 redirect
            const gu=redirectResult.user;
            const email=gu.email,displayName=gu.displayName||email.split('@')[0];
            allUsers=await loadUsers();
            let existing=allUsers.find(u=>u.email===email);
            if(existing){
              if(ADMIN_EMAILS.includes(email)&&!existing.isAdmin){existing.isAdmin=true;await saveUser(existing);}
              currentUser=existing;
            }else{
              const isAdminEmail=ADMIN_EMAILS.includes(email);
              const newUser={id:generateId(),name:displayName,email:email,phone:'',pin:'',isAdmin:isAdminEmail,status:'approved',createdAt:new Date().toISOString(),authProvider:'google',uid:gu.uid};
              await saveUser(newUser);allUsers.push(newUser);
              currentUser=newUser;
            }
            localStorage.setItem('currentUser',JSON.stringify(currentUser));
          }
        }
        if(!allUsers||!allUsers.length)allUsers=await loadUsers();sessions=await loadSessions();
        const admin=allUsers.find(u=>String(u.phone)===String(DEFAULT_ADMIN.phone));
        if(!admin){await saveUser(DEFAULT_ADMIN);allUsers.push(DEFAULT_ADMIN);}
        else if(!admin.isAdmin||admin.status!=='approved'){admin.isAdmin=true;admin.status='approved';await saveUser(admin);}
        
        // URL에서 세션 ID 확인
        const urlParams=new URLSearchParams(window.location.search);
        const sessionId=urlParams.get('session');
        
        const saved=localStorage.getItem('currentUser');
        if(saved){
          const u=JSON.parse(saved),latest=allUsers.find(x=>x.id===u.id);
          if(latest&&latest.status==='approved'){
            currentUser=latest;
            showApp();
            if(sessionId)await showSession(sessionId);
          }else showLogin();
        }else showLogin();
      }catch(e){console.error('Init error:',e);showLogin();}
      hideLoading();
    }

          if(admin){if(admin.status!=='approved'||!admin.isAdmin){admin.status='approved';admin.isAdmin=true;await saveUser(admin);}currentUser=admin;}
          else{await saveUser(DEFAULT_ADMIN);allUsers.push(DEFAULT_ADMIN);currentUser=DEFAULT_ADMIN;}
          localStorage.setItem('currentUser',JSON.stringify(currentUser));setLoginLoading(false);showTransition(()=>showApp());return;
        }
        const existing=allUsers.find(u=>String(u.phone)===cleanPhone&&String(u.pin)===pinStr);
        if(existing){
          if(existing.name!==name){showLoginError('이름이 일치하지 않습니다');setLoginLoading(false);return;}
          currentUser=existing;localStorage.setItem('currentUser',JSON.stringify(currentUser));setLoginLoading(false);showTransition(()=>showApp());
        }else{
          const samePhone=allUsers.find(u=>String(u.phone)===cleanPhone);
          if(samePhone){showLoginError('PIN 번호가 일치하지 않습니다');setLoginLoading(false);return;}
          const newUser={id:generateId(),name,phone:cleanPhone,pin:pinStr,isAdmin:false,status:'approved',createdAt:new Date().toISOString()};
          await saveUser(newUser);allUsers.push(newUser);
          currentUser=newUser;localStorage.setItem('currentUser',JSON.stringify(currentUser));setLoginLoading(false);showTransition(()=>showApp());
        }
      }catch(e){showLoginError('로그인 중 오류: '+e.message);}
      setLoginLoading(false);
    }

        s.joinRequests.push({id:generateId(),userId:currentUser.id,userName:currentUser.name,status:'pending',createdAt:new Date().toISOString()});

        await saveSession(s);

    async function approveJoinRequest(sessionId,requestId){
      showLoading();
      const s=sessions.find(x=>x.id===sessionId)||selectedSession;
      if(!s){hideLoading();return;}
      const req=(s.joinRequests||[]).find(r=>r.id===requestId);
      if(!req){hideLoading();return;}
      
      req.status='approved';
      if(!s.participants)s.participants=[];
      s.participants.push({id:req.userId,name:req.userName});
      await saveSession(s);
      if(selectedSession&&selectedSession.id===sessionId)selectedSession=s;
      hideLoading();
      showToast('승인되었습니다');
      renderSession();
    }

      showLoading();
      const s=sessions.find(x=>x.id===sessionId)||selectedSession;
      if(!s){hideLoading();return;}
      const req=(s.joinRequests||[]).find(r=>r.id===requestId);
      if(req)req.status='rejected';
      await saveSession(s);

    // 드래그 변수 (터치 + 마우스)
    let dragItem=null,dragStartY=0;

    function dragStart(clientY,e){
      const handle=e.target.closest('.drag-handle');
      if(!handle)return;
      e.preventDefault();
      dragItem=handle.closest('.track-item');
      if(!dragItem)return;
      dragStartY=clientY;
      dragItem.style.opacity='0.5';
      dragItem.style.background='rgba(251,191,36,0.2)';
    }
    function dragMove(clientY,e){
      if(!dragItem)return;
      e.preventDefault();
      const list=document.getElementById('trackList');
      if(!list)return;
      const items=Array.from(list.querySelectorAll('.track-item'));
      const idx=items.indexOf(dragItem);
      for(let i=0;i<items.length;i++){
        if(items[i]===dragItem)continue;
        const rect=items[i].getBoundingClientRect();
        const mid=rect.top+rect.height/2;
        if(clientY<mid&&i<idx){list.insertBefore(dragItem,items[i]);break;}
        else if(clientY>mid&&i>idx){list.insertBefore(dragItem,items[i].nextSibling);break;}
      }
    }
    function dragEnd(){
      if(!dragItem)return;
      dragItem.style.opacity='';
      dragItem.style.background='';
      dragItem=null;
      saveTrackOrder();
    }

    // 터치 이벤트
    function handleTouchStart(e){dragStart(e.touches[0].clientY,e);}
    function handleTouchMove(e){dragMove(e.touches[0].clientY,e);}
    function handleTouchEnd(e){dragEnd();}
    // 마우스 이벤트
    function handleMouseDown(e){dragStart(e.clientY,e);if(dragItem){document.addEventListener('mousemove',handleMouseMove);document.addEventListener('mouseup',handleMouseUp);}}
    function handleMouseMove(e){dragMove(e.clientY,e);}
    function handleMouseUp(e){dragEnd();document.removeEventListener('mousemove',handleMouseMove);document.removeEventListener('mouseup',handleMouseUp);}

    async function saveTrackOrder(){
      const items=document.querySelectorAll('#trackList .track-item');
      const updates=[];
      items.forEach((item,i)=>{
        const id=item.dataset.id;
        const track=selectedSession.tracks.find(t=>t.id===id);
        if(track&&track.trackOrder!==i+1){track.trackOrder=i+1;updates.push(track);}
      });
      for(const t of updates)await saveTrack(t);
      if(updates.length>0)showToast('순서 저장됨');
    }

    async function getGoogleAccessToken(){
      let token=localStorage.getItem('googleAccessToken');
      if(token)return token;
      // YouTube scope 토큰을 받기 위해 redirect 재인증
      const ytProvider=new firebase.auth.GoogleAuthProvider();
      ytProvider.addScope('https://www.googleapis.com/auth/youtube');
      ytProvider.setCustomParameters({prompt:'consent'});
      localStorage.setItem('ytTokenPending','1');
      auth.signInWithRedirect(ytProvider);
      return null; // 페이지가 redirect되므로 여기서 끝
    }

    async function ytFetch(url,options={}){
      const token=await getGoogleAccessToken();
      if(!token)return null;
      const res=await fetch(url,{...options,headers:{...options.headers,'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
      if(res.status===401||res.status===403){
        localStorage.removeItem('googleAccessToken');
        showToast('인증 만료 - 다시 시도해주세요');return null;
      }
      return res.json();
    }

    async function createYouTubePlaylist(){
      const tracks=selectedSession.tracks||[];
      const title=selectedSession.title||'진공관 플레이리스트';
      showLoading();
      try{
        const pl=await ytFetch('https://www.googleapis.com/youtube/v3/playlists?part=snippet',{
          method:'POST',
          body:JSON.stringify({snippet:{title:title,description:'진공관에서 자동 생성된 플레이리스트'}})
        });
        if(!pl||!pl.id){hideLoading();showToast('플레이리스트 생성 실패');return;}
        const playlistId=pl.id;
        let added=0;

        for(const t of tracks){
          const q=t.title+' '+t.artist;
          const sr=await ytFetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=1&q='+encodeURIComponent(q));
          if(sr&&sr.items&&sr.items.length>0){
            const videoId=sr.items[0].id.videoId;
            await ytFetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet',{
              method:'POST',
              body:JSON.stringify({snippet:{playlistId:playlistId,resourceId:{kind:'youtube#video',videoId:videoId}}})
            });
            added++;
          }
        }

        hideLoading();
        showToast(added+'/'+tracks.length+'곡 추가 완료!');
        window.open('https://music.youtube.com/playlist?list='+playlistId,'_blank');
      }catch(e){
        hideLoading();
        showToast('오류: '+e.message);
      }
    }
    function buildPlaylistText(){
      const s=selectedSession,tracks=s.tracks||[];
      if(!tracks.length)return null;
      const title=s.title||'플레이리스트';
      const dateStr=s.date?new Date(s.date).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}):'';
      let text=title+'\n';
      if(dateStr)text+=dateStr+'\n';
      text+='\n';
      tracks.forEach((t,i)=>{text+=(i+1)+'. '+t.title+' - '+t.artist+'\n';});
      const url=window.location.origin+window.location.pathname+'?session='+s.id;
      text+='\n'+url;
      return text;
    }

    function getDisplayName(user){
      // 동명이인 체크
      const sameName=allUsers.filter(u=>u.status==='approved'&&u.name===user.name);
      if(sameName.length>1){
        const last4=String(user.phone).slice(-4);
        return user.name+' ('+last4.slice(0,2)+'**)';
      }
      return user.name;
    }
    
    function getRecentParticipants(users){
      // 최근 세션 참가 이력으로 점수 매기기
      const participationScore={};
      const sortedSessions=[...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));
      sortedSessions.forEach((s,idx)=>{
        (s.participants||[]).forEach(p=>{
          if(!participationScore[p.id])participationScore[p.id]=0;
          participationScore[p.id]+=(sortedSessions.length-idx); // 최근일수록 높은 점수
        });
      });
      return [...users].sort((a,b)=>(participationScore[b.id]||0)-(participationScore[a.id]||0));
    }
    
    function renderParticipantList(users,showAll=false){
      const query=(document.getElementById('participantSearch')?.value||'').toLowerCase();
      const sorted=getRecentParticipants(users);
      const filtered=sorted.filter(u=>u.name.toLowerCase().includes(query));
      
      // 검색어가 있으면 전체, 없으면 10명만
      const hasQuery=query.length>0;
      const displayUsers=hasQuery?filtered:filtered.slice(0,10);
      const hasMore=!hasQuery&&filtered.length>10;
      
      if(displayUsers.length===0)return '<p style="color:#6b7280;text-align:center;padding:1rem">검색 결과가 없습니다</p>';
      
      let html=displayUsers.map(u=>{
        const isSelected=selectedParticipants.some(p=>p.id===u.id);
        const isHost=selectedHosts.some(h=>h.id===u.id);
        const displayName=getDisplayName(u);
        return '<div class="user-list-item'+(isSelected?' selected':'')+(isHost?' is-host':'')+'" onclick="toggleParticipant(\''+u.id+'\',\''+escapeHtml(u.name)+'\',\''+escapeHtml(u.phone)+'\')">'
          +'<div style="display:flex;align-items:center;gap:0.5rem">'
          +'<i class="fas fa-'+(isSelected?'check-circle" style="color:#4ade80':'circle" style="color:#3f3f46')+'"></i>'
          +'<span style="font-weight:500">'+escapeHtml(displayName)+'</span>'
          +(isSelected?'<button class="host-btn'+(isHost?' active':'')+'" onclick="event.stopPropagation();toggleHost(\''+u.id+'\',\''+escapeHtml(u.name)+'\')"><i class="fas fa-crown"></i></button>':'')
          +'</div>'
          +'</div>';
      }).join('');
      
      if(hasMore){
        html+='<p style="color:#9ca3af;text-align:center;padding:0.75rem;font-size:0.75rem">외 '+(filtered.length-10)+'명 · 검색으로 찾기</p>';
      }
      
      return html;
    }
    
    function filterParticipantList(){
      const approvedUsers=allUsers.filter(u=>u.status==='approved');
      document.getElementById('participantList').innerHTML=renderParticipantList(approvedUsers);
    }
    
    function toggleParticipant(id,name,phone){
      const idx=selectedParticipants.findIndex(p=>p.id===id);
      if(idx>=0){
        selectedParticipants.splice(idx,1);
        // 호스트에서도 제거
        const hostIdx=selectedHosts.findIndex(h=>h.id===id);
        if(hostIdx>=0)selectedHosts.splice(hostIdx,1);
      }else{
        selectedParticipants.push({id,name,phone});
      }
      updateSelectedChips();
      filterParticipantList();
    }
    
    function toggleHost(id,name){
      const idx=selectedHosts.findIndex(h=>h.id===id);
      if(idx>=0){
        selectedHosts.splice(idx,1);
      }else{
        const participant=selectedParticipants.find(p=>p.id===id);
        if(participant)selectedHosts.push({id,name});
      }
      updateSelectedChips();
      filterParticipantList();
    }
    
    function removeParticipant(id){
      const idx=selectedParticipants.findIndex(p=>p.id===id);
      if(idx>=0)selectedParticipants.splice(idx,1);
      const hostIdx=selectedHosts.findIndex(h=>h.id===id);
      if(hostIdx>=0)selectedHosts.splice(hostIdx,1);
      updateSelectedChips();
      filterParticipantList();
    }
    
    function updateSelectedChips(){
      const container=document.getElementById('selectedChips');
      if(!container)return;
      if(selectedParticipants.length===0){
        container.innerHTML='<span style="color:#6b7280;font-size:0.875rem">선택된 참가자가 없습니다</span>';
        return;
      }
      container.innerHTML=selectedParticipants.map(p=>{
        const isHost=selectedHosts.some(h=>h.id===p.id);
        const displayName=getDisplayName(p);
        return '<div class="selected-chip'+(isHost?' host-chip':'')+'">'+(isHost?'<i class="fas fa-crown" style="font-size:0.625rem"></i> ':'')+escapeHtml(displayName)+'<button class="remove-chip" onclick="removeParticipant(\''+p.id+'\')"><i class="fas fa-times"></i></button></div>';
      }).join('');
    }

    function handleThumbUpload(e){
      const file=e.target.files[0];if(!file)return;
      if(file.size>5*1024*1024){showToast('이미지 크기는 5MB 이하여야 합니다');return;}
      thumbFile=file;
      const reader=new FileReader();
      reader.onload=function(ev){
        document.getElementById('thumbPreview').innerHTML='<img src="'+ev.target.result+'">';
      };
      reader.readAsDataURL(file);
    }

      await saveSession(s);

    function filterEditParticipantList(){

    function toggleEditParticipant(id,name,phone){
      const idx=editParticipants.findIndex(p=>p.id===id);
      if(idx>=0){
        editParticipants.splice(idx,1);
        const hostIdx=editHosts.findIndex(h=>h.id===id);
        if(hostIdx>=0)editHosts.splice(hostIdx,1);
      }else{
        editParticipants.push({id,name,phone});
      }
      updateEditSelectedChips();
      filterEditParticipantList();
    }
    
    function toggleEditHost(id,name){
      const idx=editHosts.findIndex(h=>h.id===id);
      if(idx>=0){
        editHosts.splice(idx,1);
      }else{
        const participant=editParticipants.find(p=>p.id===id);
        if(participant)editHosts.push({id,name});
      }
      updateEditSelectedChips();
      filterEditParticipantList();
    }
    
    function removeEditParticipant(id){
      const idx=editParticipants.findIndex(p=>p.id===id);
      if(idx>=0)editParticipants.splice(idx,1);
      const hostIdx=editHosts.findIndex(h=>h.id===id);
      if(hostIdx>=0)editHosts.splice(hostIdx,1);
      updateEditSelectedChips();
      filterEditParticipantList();
    }
    
    function updateEditSelectedChips(){
      const container=document.getElementById('editSelectedChips');
      if(!container)return;
      if(editParticipants.length===0){
        container.innerHTML='<span style="color:#6b7280;font-size:0.875rem">선택된 참가자가 없습니다</span>';
        return;

      container.innerHTML=editParticipants.map(p=>{
        const isHost=editHosts.some(h=>h.id===p.id);

        return '<div class="selected-chip'+(isHost?' host-chip':'')+'">'+(isHost?'<i class="fas fa-crown" style="font-size:0.625rem"></i> ':'')+escapeHtml(displayName)+'<button class="remove-chip" onclick="removeEditParticipant(\''+p.id+'\')"><i class="fas fa-times"></i></button></div>';

    function handleEditThumbUpload(e){
      const file=e.target.files[0];if(!file)return;
      if(file.size>5*1024*1024){showToast('이미지 크기는 5MB 이하여야 합니다');return;}
      editThumbFile=file;
      const reader=new FileReader();
      reader.onload=function(ev){
        document.getElementById('editThumbPreview').innerHTML='<img src="'+ev.target.result+'">';
      };
      reader.readAsDataURL(file);
    }

      showToast('썸네일이 제거됩니다 (저장 시 반영)');

    async function saveEditSession(){
      selectedSession.title=document.getElementById('editTitle').value.trim();
      selectedSession.date=document.getElementById('editDate').value;
      selectedSession.time=document.getElementById('editTime').value;
      selectedSession.location=document.getElementById('editLocation').value.trim();
      selectedSession.description=document.getElementById('editDescription').value.trim();
      selectedSession.allowSongRequest=document.getElementById('editAllowSongRequestToggle').classList.contains('active');
      selectedSession.allowJoinRequest=document.getElementById('editAllowJoinRequestToggle').classList.contains('active');
      selectedSession.requireJoinApproval=document.getElementById('editRequireJoinApprovalToggle').classList.contains('active');
      
      showLoading();
      
      // 기존 썸네일 삭제 (새 썸네일 업로드 또는 썸네일 제거 시)
      const oldThumbnail=selectedSession.thumbnail;
      
      // 새 썸네일 업로드
      if(editThumbFile){
        try{
          if(oldThumbnail)await deleteImageFromStorage(oldThumbnail);
          const blob=await compressImage(editThumbFile);
          editThumbnail=await uploadImageToStorage(blob,'thumbnails/'+selectedSession.id+'.jpg');
        }catch(e){console.error('Thumbnail upload error:',e);showToast('썸네일 업로드 실패');}
      }else if(!editThumbnail&&oldThumbnail){
        await deleteImageFromStorage(oldThumbnail);
      }
      selectedSession.thumbnail=editThumbnail;
      
      // 참가자 및 호스트 업데이트
      selectedSession.participants=editParticipants.map(p=>({id:p.id,name:p.name}));
      selectedSession.hosts=editHosts.map(h=>({id:h.id,name:h.name}));
      
      await saveSession(selectedSession);
      editThumbFile=null;
      showToast('수정됨');
      await showSession(selectedSession.id);
      hideLoading();
    }

    let historyTab='myTracks';
    let historyData={myTracks:[],myBestVotes:[],mySessions:[],rankings:[]};
    
    async function renderHistory(){
      const main=document.getElementById('mainContent');showLoading();
      try{
        sessions=await loadSessions();allUsers=await loadUsers();
        
        // 내가 참여한 세션들
        const mySessions=sessions.filter(s=>(s.participants||[]).some(p=>p.id===currentUser.id));
        
        // 내가 추천한 음악들 로드
        const myTracks=[];
        const myBestVotes=[];
        
        for(const s of mySessions){
          const tracks=await loadTracks(s.id);
          const votes=await loadVotes(s.id);
          
          // 내가 추천한 음악
          tracks.filter(t=>t.recommenderId===currentUser.id).forEach(t=>{
            const isWinner=s.winnerId===currentUser.id;
            myTracks.push({...t,sessionId:s.id,sessionTitle:s.title,sessionDate:s.date,isWinner});
          });
          
          // 내가 1등 준 음악
          const myBest=votes.find(v=>v.oderId===currentUser.id&&v.isBest===true);
          if(myBest){
            const bestTrack=tracks.find(t=>t.id===myBest.trackId);
            if(bestTrack){
              myBestVotes.push({...bestTrack,sessionId:s.id,sessionTitle:s.title,sessionDate:s.date});
            }
          }
        }
        
        // 우승 랭킹
        const wins={};
        sessions.filter(s=>s.winnerId).forEach(s=>{wins[s.winnerId]=(wins[s.winnerId]||0)+1;});
        const rankings=allUsers.filter(u=>wins[u.id]).map(u=>({id:u.id,name:u.name,wins:wins[u.id]})).sort((a,b)=>b.wins-a.wins);
        
        historyData={myTracks,myBestVotes,mySessions,rankings};
        
        renderHistoryContent(main);
      }catch(e){console.error(e);main.innerHTML='<div class="empty-state">오류</div>';}
      hideLoading();
    }

      const {myTracks,myBestVotes,mySessions,rankings}=historyData;
      
      let html='<div class="page-header"><h1 class="page-title">지난 음감회</h1><button class="refresh-btn desktop-only" onclick="refreshHistory()" title="새로고침"><i class="fas fa-sync-alt"></i></button></div>';

      html+='<div class="pull-indicator" id="pullIndicator"><i class="fas fa-sync-alt"></i> 새로고침 중...</div>';
      
      // 우승 랭킹
      if(rankings.length>0){
        html+='<div class="card" style="margin-bottom:1rem"><h3 style="font-weight:600;margin-bottom:1rem"><i class="fas fa-trophy" style="color:#fbbf24;margin-right:0.5rem"></i>우승 랭킹</h3>';
        rankings.forEach((r,i)=>{
          const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'other';
          const isMe=r.id===currentUser.id;
          html+='<div class="ranking-item" style="'+(isMe?'background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3)':'')+'"><div class="ranking-position '+pc+'">'+(i+1)+'</div><div class="ranking-name">'+escapeHtml(r.name)+(isMe?' (나)':'')+'</div><div class="ranking-wins">'+r.wins+'회</div></div>';
        });
        html+='</div>';
      }
      
      // 탭
      html+='<div class="tabs" style="margin-bottom:1rem">';
      html+='<button class="tab '+(historyTab==='myTracks'?'active':'')+'" onclick="switchHistoryTab(\'myTracks\')"><i class="fas fa-music"></i> 내가 추천한 음악 ('+myTracks.length+')</button>';
      html+='<button class="tab '+(historyTab==='myBest'?'active':'')+'" onclick="switchHistoryTab(\'myBest\')"><i class="fas fa-star"></i> 내가 1등 준 음악 ('+myBestVotes.length+')</button>';
      html+='<button class="tab '+(historyTab==='mySessions'?'active':'')+'" onclick="switchHistoryTab(\'mySessions\')"><i class="fas fa-calendar-check"></i> 참여한 음감회 ('+mySessions.length+')</button>';

      // 탭 콘텐츠
      html+='<div id="historyTabContent">';
      
      if(historyTab==='myTracks'){

        else{
          myTracks.sort((a,b)=>new Date(b.sessionDate)-new Date(a.sessionDate));
          myTracks.forEach(t=>{
            html+='<div class="track-item" style="cursor:pointer;'+(t.isWinner?'background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3)':'')+'" onclick="goToPlaylist(\''+t.sessionId+'\')">';
            if(t.isWinner)html+='<div style="color:#fbbf24"><i class="fas fa-trophy"></i></div>';
            html+='<div class="track-info"><div class="track-title">'+escapeHtml(t.title)+(t.isWinner?' <span style="color:#fbbf24;font-size:0.75rem">우승!</span>':'')+'</div><div class="track-artist">'+escapeHtml(t.artist)+'</div><div class="track-recommender">'+escapeHtml(t.sessionTitle)+' ('+formatDate(t.sessionDate)+')</div></div>';
            html+='<i class="fas fa-chevron-right" style="color:#6b7280"></i></div>';
          });
        }
      }else if(historyTab==='myBest'){
        if(myBestVotes.length===0)html+='<div class="empty-state"><i class="fas fa-star"></i><p>아직 1등 투표한 음악이 없습니다</p></div>';
        else{
          myBestVotes.sort((a,b)=>new Date(b.sessionDate)-new Date(a.sessionDate));
          myBestVotes.forEach(t=>{
            html+='<div class="track-item" style="cursor:pointer" onclick="goToPlaylist(\''+t.sessionId+'\')">';

            html+='<i class="fas fa-chevron-right" style="color:#6b7280"></i></div>';
          });
        }
      }else{
        if(mySessions.length===0)html+='<div class="empty-state"><i class="fas fa-calendar-check"></i><p>참여한 음감회가 없습니다</p></div>';

          mySessions.forEach(s=>{
            const cat=CATEGORIES.find(c=>c.id===s.category)||CATEGORIES[0];
            html+='<div class="card" onclick="showSession(\''+s.id+'\')" style="cursor:pointer"><div style="display:flex;gap:0.5rem;margin-bottom:0.5rem"><span class="badge badge-gray">'+cat.emoji+' '+cat.name+'</span>';

          // 추천한 곡

            html+='<i class="fas fa-chevron-right" style="color:#6b7280"></i></div>';
          });

        // 1등 투표한 곡
        html+='<div class="card"><h3 style="font-weight:600;margin-bottom:1rem"><i class="fas fa-star" style="color:#fbbf24;margin-right:0.5rem"></i>1등 투표한 음악 ('+userBestVotes.length+')</h3>';
        if(userBestVotes.length===0)html+='<p style="color:#6b7280">아직 1등 투표한 음악이 없습니다</p>';
        else{
          userBestVotes.sort((a,b)=>new Date(b.sessionDate)-new Date(a.sessionDate));
          userBestVotes.slice(0,10).forEach(t=>{
            html+='<div class="track-item" style="cursor:pointer" onclick="goToPlaylist(\''+t.sessionId+'\')">';
            html+='<div style="color:#fbbf24"><i class="fas fa-star"></i></div>';
            html+='<div class="track-info"><div class="track-title">'+escapeHtml(t.title)+'</div><div class="track-artist">'+escapeHtml(t.artist)+'</div><div class="track-recommender">'+escapeHtml(t.sessionTitle)+' ('+formatDate(t.sessionDate)+')</div></div>';
            html+='<i class="fas fa-chevron-right" style="color:#6b7280"></i></div>';
          });
          if(userBestVotes.length>10)html+='<p style="color:#6b7280;text-align:center;margin-top:0.5rem">외 '+(userBestVotes.length-10)+'곡 더</p>';
        }
        html+='</div>';
        
        main.innerHTML=html;
      }catch(e){
        console.error(e);
        main.innerHTML='<div class="empty-state">오류가 발생했습니다</div>';
      }
      hideLoading();
    }
    
    function goBack(){
      if(selectedSession)showSession(selectedSession.id);
      else goHome();
    }

    function showSongRequestModal(){
      const m=document.createElement('div');m.className='modal-overlay';m.id='songRequestModal';
      m.innerHTML='<div class="modal"><h3 class="modal-title">신청곡</h3><div class="input-group"><label class="input-label">곡</label><input type="text" id="reqTitle" class="input input-no-icon" placeholder="곡 제목"></div><div class="input-group"><label class="input-label">아티스트</label><input type="text" id="reqArtist" class="input input-no-icon" placeholder="아티스트"></div><div class="input-group"><label class="input-label">신청사유 (선택)</label><textarea id="reqReason" class="input input-no-icon" rows="2" placeholder="신청 이유가 있다면 작성해주세요"></textarea></div><div class="modal-actions"><button class="btn btn-zinc" onclick="closeSongRequestModal()">취소</button><button class="btn btn-amber" onclick="submitSongRequest()">요청</button></div></div>';
      document.body.appendChild(m);
    }
    function closeSongRequestModal(){const m=document.getElementById('songRequestModal');if(m)m.remove();}
    async function submitSongRequest(){
      const title=document.getElementById('reqTitle').value.trim(),artist=document.getElementById('reqArtist').value.trim(),reason=document.getElementById('reqReason').value.trim();if(!title||!artist){showToast('입력 필수');return;}
      const r={id:generateId(),sessionId:selectedSession.id,title,artist,reason,requesterId:currentUser.id,requesterName:currentUser.name,status:'pending',createdAt:new Date().toISOString()};
      showLoading();await saveSongRequest(r);closeSongRequestModal();showToast('요청됨');await showSession(selectedSession.id);hideLoading();
    }

    // PIN 로그인 제거됨 - Google 로그인만 사용
    
    // 새로고침 함수들
    async function refreshHome(){
      const btn=document.querySelector('.filter-header .refresh-btn');
      if(btn)btn.classList.add('spinning');
      sessions=[];// 캐시 초기화
      await renderHome();
      if(btn)btn.classList.remove('spinning');
      showToast('새로고침 완료');
    }
    
    async function refreshSession(){
      const btn=document.querySelector('.tabs-wrapper .refresh-btn');
      if(btn)btn.classList.add('spinning');
      if(selectedSession){
        selectedSession=await loadSession(selectedSession.id);
        if(selectedSession){
          selectedSession.tracks=await loadTracks(selectedSession.id);
          selectedSession.votes=await loadVotes(selectedSession.id);
          selectedSession.songRequests=await loadSongRequests(selectedSession.id);
        }
        const activeTab=document.querySelector('#sessionTabs .tab.active');
        const tabName=activeTab?['info','playlist','vote','result'][Array.from(document.querySelectorAll('#sessionTabs .tab')).indexOf(activeTab)]:'info';
        switchTab(tabName);
      }
      if(btn)btn.classList.remove('spinning');
      showToast('새로고침 완료');
    }
    
    async function refreshAdminUsers(){
      const btn=document.querySelector('.page-header .refresh-btn');
      if(btn)btn.classList.add('spinning');
      allUsers=await loadUsers();
      renderAdminUsers();
      if(btn)btn.classList.remove('spinning');
      showToast('새로고침 완료');
    }
    
    async function refreshHistory(){
      const btn=document.querySelector('.page-header .refresh-btn');
      if(btn)btn.classList.add('spinning');
      await renderHistory();
      if(btn)btn.classList.remove('spinning');
      showToast('새로고침 완료');
    }
    
    // Pull-to-refresh (모바일)
    let pullStartY=0;
    let isPulling=false;
    
    document.addEventListener('touchstart',e=>{
      if(window.scrollY===0){
        pullStartY=e.touches[0].clientY;
        isPulling=true;
      }
    },{passive:true});
    
    document.addEventListener('touchmove',e=>{
      if(!isPulling)return;
      const pullDistance=e.touches[0].clientY-pullStartY;
      const indicator=document.getElementById('pullIndicator');
      if(pullDistance>150&&indicator){
        indicator.classList.add('visible');
      }
    },{passive:true});
    
    document.addEventListener('touchend',async e=>{
      if(!isPulling)return;
      isPulling=false;
      const indicator=document.getElementById('pullIndicator');
      if(indicator&&indicator.classList.contains('visible')){
        // 현재 화면에 따라 새로고침
        if(currentView==='home')await refreshHome();
        else if(currentView==='session')await refreshSession();
        else if(currentView==='admin-users')await refreshAdminUsers();
        else if(currentView==='history')await refreshHistory();
        indicator.classList.remove('visible');
      }
    });
    
    // 브라우저 뒤로가기 처리
    window.addEventListener('popstate',()=>{
      const urlParams=new URLSearchParams(window.location.search);
      const sessionId=urlParams.get('session');
      if(sessionId)showSession(sessionId);
      else if(currentUser)goHome();
    });
    
    // PWA 설치 프롬프트 (Android)
    let deferredPrompt=null;
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault();
      deferredPrompt=e;
    });
    
    // 홈 화면 추가 안내 바텀시트
    function checkInstallPrompt(){
      // 이미 PWA로 실행 중이면 안 보여줌
      if(window.matchMedia('(display-mode: standalone)').matches)return;
      if(window.navigator.standalone===true)return;
      
      // 모바일만
      const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if(!isMobile)return;
      
      // 7일간 보지 않기 체크
      const dismissed=localStorage.getItem('installDismissed');
      if(dismissed){
        const dismissedDate=new Date(parseInt(dismissed));
        const now=new Date();
        const daysDiff=(now-dismissedDate)/(1000*60*60*24);
        if(daysDiff<7)return;
      }
      
      showInstallSheet();
    }
    
    function showInstallSheet(){
      const isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
      const sheet=document.createElement('div');
      sheet.className='install-sheet';
      sheet.id='installSheet';
      
      let html='<div class="install-sheet-handle"></div>';
      html+='<div class="install-sheet-title">📱 진공관 앱 설치하기</div>';
      html+='<div class="install-sheet-desc">홈 화면에서 바로 실행할 수 있어요</div>';
      
      if(isIOS){
        html+='<div class="install-steps">';
        html+='<div class="install-step"><div class="install-step-num">1</div>하단 <i class="fas fa-share-from-square" style="color:#fbbf24"></i> 공유 버튼 탭</div>';
        html+='<div class="install-step"><div class="install-step-num">2</div>"홈 화면에 추가" 선택</div>';
        html+='</div>';
        html+='<div class="install-sheet-actions">';
        html+='<button class="btn btn-zinc" onclick="dismissInstall(true)">7일간 보지 않기</button>';
        html+='<button class="btn btn-amber" onclick="dismissInstall(false)">닫기</button>';
        html+='</div>';
      }else{
        html+='<div class="install-sheet-actions">';
        html+='<button class="btn btn-zinc" onclick="dismissInstall(true)">7일간 보지 않기</button>';
        html+='<button class="btn btn-amber" onclick="installPWA()">설치하기</button>';
        html+='</div>';
      }
      
      sheet.innerHTML=html;
      document.body.appendChild(sheet);
      setTimeout(()=>sheet.classList.add('show'),100);
    }
    
    function dismissInstall(saveDismiss){
      if(saveDismiss){
        localStorage.setItem('installDismissed',Date.now().toString());
      }
      const sheet=document.getElementById('installSheet');
      if(sheet){
        sheet.classList.remove('show');
        setTimeout(()=>sheet.remove(),300);
      }
    }
    
    async function installPWA(){
      if(deferredPrompt){
        deferredPrompt.prompt();
        const{outcome}=await deferredPrompt.userChoice;
        deferredPrompt=null;
      }
      dismissInstall(false);
    }
    
    // 로그인 성공 후 바텀시트 표시
    const originalShowApp=showApp;
    showApp=function(){
      originalShowApp();
      setTimeout(checkInstallPrompt,1000);
    };
    
    // Service Worker 등록
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js')
        .then(reg=>console.log('SW registered'))
        .catch(err=>console.log('SW registration failed:',err));
    }
    
    init();
  </script>
</body>
</html>
